        async function processWithCode(code, remaining) {
            if (filesList.length === 0) {
                showToast('请先选择文件', 'error');
                return false;
            }

            // 只处理图片文件，视频需要单独的视频兑换券
            const imageFiles = filesList.filter(f => f.type !== 'video');
            const videoFiles = filesList.filter(f => f.type === 'video');
            const allowedCount = remaining === -1 ? imageFiles.length : Math.min(remaining, imageFiles.length);

            loading.classList.add('active');
            processedBlobs = [];
            let failCount = 0;
            const errors = [];

            // 处理图片
            for (let i = 0; i < imageFiles.length; i++) {
                loading.querySelector('.loading-text').textContent = `处理图片 ${i+1}/${imageFiles.length}...`;
                try {
                    const blob = await processImage(imageFiles[i]);
                    if (!blob || blob.size === 0) {
                        errors.push(imageFiles[i].file.name + ': 生成文件为空');
                        failCount++;
                        continue;
                    }
                    const baseName = imageFiles[i].file.name.replace(/\.[^.]+$/, '');
                    processedBlobs.push({
                        blob: blob,
                        fileName: `${baseName}_edited.jpg`,
                        thumb: imageFiles[i].dataUrl,
                        downloaded: false,
                        isVideo: false
                    });
                } catch (err) {
                    errors.push(imageFiles[i].file.name + ': ' + err.message);
                    failCount++;
                }
            }

            // 处理视频文件（免费模式，无需兑换券）
            for (let i = 0; i < videoFiles.length; i++) {
                loading.querySelector('.loading-text').textContent = `处理视频 ${i+1}/${videoFiles.length}...`;
                try {
                    const blob = await processVideo(videoFiles[i]);
                    if (!blob || blob.size === 0) {
                        errors.push(videoFiles[i].file.name + ': 视频生成为空');
                        failCount++;
                        continue;
                    }
                    const baseName = videoFiles[i].file.name.replace(/\.[^.]+$/, '');
                    const ext = videoFiles[i].file.name.split('.').pop().toLowerCase();
                    processedBlobs.push({
                        blob: blob,
                        fileName: `${baseName}_edited.${ext}`,
                        thumb: videoFiles[i].dataUrl,
                        downloaded: false,
                        isVideo: true
                    });
                } catch (err) {
                    errors.push(videoFiles[i].file.name + ': ' + err.message);
                    failCount++;
                }
            }
            loading.classList.remove('active');

            if (processedBlobs.length === 0) {
                console.error('All files failed to process. Errors:', errors);
                var errMsg = errors.length > 0 ? errors[0] : '请检查文件格式';
                showToast('处理失败: ' + errMsg, 'error');
                return false;
            }
            if (failCount > 0) {
                showToast(`${failCount}个文件处理失败，已跳过`, 'error');
            }

            // 额度扣已跳过（无限模式）

            currentKamiAllowed = remaining === -1 ? -1 : remaining;
            showDownloadModal();
            return true;
        }

        function showDownloadModal() {
            processedBlobs.forEach(item => {
                if (!item.objectUrl && item.blob) {
                    item.objectUrl = URL.createObjectURL(item.blob);
                }
            });

            downloadList.innerHTML = processedBlobs.map((item, index) => {
                const thumbSrc = item.isVideo ? item.thumb : item.objectUrl;
                const statusText = item.isVideo ? '点击下载按钮保存视频' : '长按图片保存 / 点击下载';
                return `
                    <div class="download-item" data-index="${index}">
                        <img class="download-item-thumb" src="${thumbSrc}" alt="${item.fileName}" ${item.isVideo ? 'style="-webkit-touch-callout:none;"' : ''}>
                        ${item.isVideo ? '<div class="file-item-video-badge" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:40px;height:40px;font-size:18px;pointer-events:none;">▶</div>' : ''}
                        <div class="download-item-bar">
                            <div class="download-item-info">
                                <div class="download-item-name">${item.fileName}</div>
                                <div class="download-item-status" id="status-${index}">${statusText}</div>
                            </div>
                            <button class="download-item-btn" data-index="${index}">下载</button>
                        </div>
                    </div>
                `;
            }).join('');

            downloadList.querySelectorAll('.download-item-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    downloadSingleFile(index, btn);
                });
            });

            downloadList.querySelectorAll('.download-item').forEach(item => {
                const index = parseInt(item.dataset.index);
                const pb = processedBlobs[index];
                if (!pb || !pb.isVideo) return;
                let pressTimer = null;
                item.addEventListener('touchstart', (e) => {
                    if (e.target.closest('.download-item-btn')) return;
                    pressTimer = setTimeout(() => {
                        showToast('视频请点击下载按钮保存', 'info');
                    }, 500);
                }, {
                    passive: true
                });
                item.addEventListener('touchend', () => {
                    clearTimeout(pressTimer);
                }, {
                    passive: true
                });
                item.addEventListener('touchmove', () => {
                    clearTimeout(pressTimer);
                }, {
                    passive: true
                });
            });

            downloadAllBtn.textContent = '全部下载';

            downloadModal.classList.add('active');
        }

        async function downloadSingleFile(index, btn) {
            const item = processedBlobs[index];
            btn.disabled = true;
            btn.textContent = '…';

            if (item.isVideo && navigator.canShare) {
                try {
                    const mime = item.blob.type || 'video/mp4';
                    const file = new File([item.blob], item.fileName, {
                        type: mime
                    });
                    if (navigator.canShare({
                            files: [file]
                        })) {
                        await navigator.share({
                            files: [file]
                        });
                        item.downloaded = true;
                        btn.textContent = '✓';
                        document.getElementById(`status-${index}`).textContent = '已保存';
                        document.getElementById(`status-${index}`).classList.add('done');
                        return;
                    }
                } catch (err) {
                    if (err.name === 'AbortError') {
                        btn.disabled = false;
                        btn.textContent = '下载';
                        return;
                    }
                }
            }

            downloadBlob(item.blob, item.fileName, item.isVideo);
            item.downloaded = true;
            btn.textContent = '✓';
            btn.disabled = true;
            document.getElementById(`status-${index}`).textContent = '已下载';
            document.getElementById(`status-${index}`).classList.add('done');
        }

        async function downloadAllFiles() {
            const btns = downloadList.querySelectorAll('.download-item-btn:not(:disabled)');
            for (const btn of btns) {
                const index = parseInt(btn.dataset.index);
                downloadSingleFile(index, btn);
                await new Promise(r => setTimeout(r, 500));
            }
        }

        function processImage(item) {
            return new Promise((resolve, reject) => {
                const img = new Image();

                img.onload = () => {
                    if (!img.width || !img.height) {
                        reject(new Error('图片尺寸无效: ' + item.file.name));
                        return;
                    }

                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        if (!ctx) {
                            reject(new Error('无法创建Canvas上下文'));
                            return;
                        }
                        ctx.drawImage(img, 0, 0);

                        let jpegDataUrl = canvas.toDataURL('image/jpeg', 0.95);

                        if (!jpegDataUrl || jpegDataUrl === 'data:,' || jpegDataUrl.length < 100) {
                            jpegDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            if (!jpegDataUrl || jpegDataUrl === 'data:,' || jpegDataUrl.length < 100) {
                                reject(new Error('图片转换失败（可能内存不足）: ' + item.file.name));
                                canvas.width = 0;
                                canvas.height = 0;
                                return;
                            }
                        }

                        let resultBlob;
                        try {
                            const newExif = buildNewExif(img.width, img.height);
                            const exifBytes = piexif.dump(newExif);
                            const finalData = piexif.insert(exifBytes, jpegDataUrl);
                            jpegDataUrl = null; // 释放中间base64内存
                            resultBlob = dataUrlToBlob(finalData);
                        } catch (err) {
                            resultBlob = dataUrlToBlob(jpegDataUrl);
                            jpegDataUrl = null;
                        }

                        canvas.width = 0;
                        canvas.height = 0;

                        if (!resultBlob || resultBlob.size === 0) {
                            reject(new Error('导出结果为空: ' + item.file.name));
                            return;
                        }

                        resolve(resultBlob);
                    } catch (err) {
                        reject(new Error('处理异常: ' + item.file.name));
                    }
                };

                img.onerror = () => {
                    reject(new Error('图片加载失败: ' + item.file.name));
                };

                img.src = item.objectUrl || item.dataUrl;
            });
        }

        async function processVideo(item) {
            const make = document.getElementById('make').value.trim();
            const model = document.getElementById('model').value.trim();
            const software = document.getElementById('software').value.trim();

            const meta = {
                make,
                model,
                software
            };

            // GPS 位置
            const gpsLat = document.getElementById('gpsLatitudeInput').value.trim();
            const gpsLng = document.getElementById('gpsLongitudeInput').value.trim();
            if (gpsLat && gpsLng) {
                const lat = parseFloat(gpsLat);
                const lng = parseFloat(gpsLng);
                if (!isNaN(lat) && !isNaN(lng)) {
                    meta.location = {
                        lat,
                        lng
                    };
                }
            }

            // 拍摄日期
            const dateTimeOriginal = document.getElementById('dateTimeOriginal').value;
            if (dateTimeOriginal) {
                const d = new Date(dateTimeOriginal);
                if (!isNaN(d.getTime())) {
                    const offset = document.getElementById('offsetTime').value.trim() || '+08:00';
                    const pad = (n) => n.toString().padStart(2, '0');
                    meta.creationDate = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) + offset.replace(':', '');
                }
            }

            var hasMetadata = !!(make || model || software || meta.location || meta.creationDate);
            if (!hasMetadata) throw new Error('请至少填写一项信息');

            var arrayBuffer = await item.file.arrayBuffer();
            var newBuffer = writeVideoMetadata(arrayBuffer, meta);
            var ext = item.file.name.split('.').pop().toLowerCase();
            var mimeType = ext === 'mov' ? 'video/quicktime' : 'video/mp4';
            return new Blob([newBuffer], {
                type: mimeType
            });
        }

        function dataUrlToBlob(dataUrl) {
            if (!dataUrl || !dataUrl.includes(',')) {
                return new Blob([], {
                    type: 'image/jpeg'
                });
            }
            const parts = dataUrl.split(',');
            const base64Data = parts[1];
            if (!base64Data || base64Data.length === 0) {
                return new Blob([], {
                    type: 'image/jpeg'
                });
            }
            const byteString = atob(base64Data);
            const mimeString = parts[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], {
                type: mimeString
            });
        }

        function downloadBlob(blob, fileName, isVideo) {
            if (!blob || blob.size === 0) {
                showToast('导出失败：文件为空', 'error');
                return;
            }

            if (!isVideo) {
                if (blob.type !== 'image/jpeg') {
                    blob = new Blob([blob], {
                        type: 'image/jpeg'
                    });
                }
                if (!fileName.toLowerCase().endsWith('.jpg') && !fileName.toLowerCase().endsWith('.jpeg')) {
                    fileName = fileName.replace(/\.[^.]+$/, '.jpg');
                }
            }

            const ua = navigator.userAgent;
            const isAndroid = /Android/i.test(ua);
            const isIOS = /iPad|iPhone|iPod/.test(ua);

            // 安卓使用直接下载，避免 navigator.share() 导致 EXIF 信息丢失或视频拉起分享
            if (isAndroid) {
                fallbackDownload(blob, fileName);
                return;
            }

            if ((isAndroid || isIOS) && navigator.canShare) {
                try {
                    const shareMime = isVideo ? (blob.type || 'video/mp4') : 'image/jpeg';
                    const file = new File([blob], fileName, {
                        type: shareMime
                    });
                    if (navigator.canShare({
                            files: [file]
                        })) {
                        navigator.share({
                                files: [file]
                            })
                            .then(() => {
                                showToast('已保存', 'success');
                            })
                            .catch((err) => {
                                if (err.name !== 'AbortError') {
                                    console.error('share failed:', err);
                                    fallbackDownload(blob, fileName);
                                }
                            });
                        return;
                    }
                } catch (e) {
                    console.error('share API error:', e);
                }
            }

            fallbackDownload(blob, fileName);
        }

        function showImageForSave(blob, fileName) {
            const existing = document.querySelector('.save-image-overlay');
            if (existing) existing.remove();

            const reader = new FileReader();
            reader.onload = function() {
                const dataUrl = reader.result;

                const overlay = document.createElement('div');
                overlay.className = 'save-image-overlay';
                overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;';

                overlay.innerHTML =
                    '<p style="color:#fff;font-size:16px;margin:0 0 15px;text-align:center;line-height:1.6;">长按下方图片 → 选择「保存图片」</p>' +
                    '<img src="' + dataUrl + '" style="max-width:90%;max-height:65vh;border-radius:8px;object-fit:contain;" />' +
                    '<button style="margin-top:20px;padding:12px 40px;background:#409eff;color:#fff;border:none;border-radius:25px;font-size:15px;cursor:pointer;">关闭</button>';

                overlay.querySelector('button').addEventListener('click', function() {
                    overlay.remove();
                });
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) overlay.remove();
                });

                document.body.appendChild(overlay);
            };
            reader.onerror = function() {
                fallbackDownload(blob, fileName);
            };
            reader.readAsDataURL(blob);
        }

        function fallbackDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();

            setTimeout(() => {
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 10000);
        }

        async function processVideosWithCode(code, remaining) {
            // 纯视频模式（filesList只有视频）
            const videoFiles = filesList.filter(f => f.type === 'video');
            if (videoFiles.length === 0) {
                showToast('没有视频文件', 'error');
                return false;
            }

            const allowedCount = remaining === -1 ? videoFiles.length : Math.min(remaining, videoFiles.length);

            loading.classList.add('active');
            processedBlobs = [];
            let failCount = 0;
            const errors = [];

            for (let i = 0; i < videoFiles.length; i++) {
                loading.querySelector('.loading-text').textContent = `处理视频 ${i+1}/${videoFiles.length}...`;
                try {
                    const blob = await processVideo(videoFiles[i]);
                    if (!blob || blob.size === 0) {
                        errors.push(videoFiles[i].file.name + ': 生成文件为空');
                        failCount++;
                        continue;
                    }
                    const baseName = videoFiles[i].file.name.replace(/\.[^.]+$/, '');
                    const ext = videoFiles[i].file.name.split('.').pop().toLowerCase();
                    processedBlobs.push({
                        blob: blob,
                        fileName: `${baseName}_edited.${ext}`,
                        thumb: videoFiles[i].dataUrl,
                        downloaded: false,
                        isVideo: true
                    });
                } catch (err) {
                    errors.push(videoFiles[i].file.name + ': ' + err.message);
                    failCount++;
                }
            }
            loading.classList.remove('active');

            if (processedBlobs.length === 0) {
                const errMsg = errors.length > 0 ? errors[0] : '请检查文件格式';
                showToast('处理失败: ' + errMsg, 'error');
                return false;
            }
            if (failCount > 0) {
                showToast(`${failCount}个视频处理失败，已跳过`, 'error');
            }

            // 视频额度扣已跳过（无限模式）

            localStorage.setItem('video_kami_code', code);
            updateVideoKamiStatus();
            currentKamiAllowed = remaining === -1 ? -1 : remaining;
            showDownloadModal();
            return true;
        }

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
